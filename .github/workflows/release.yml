# Required GitHub Secrets for Apple code signing and notarization:
#
# 1. Export your Developer ID Application certificate from Keychain Access as .p12
# 2. Base64 encode it: base64 -i certificate.p12 | pbcopy
# 3. Set these secrets in GitHub repo Settings → Secrets:
#    - APPLE_CERTIFICATE: the base64 string
#    - APPLE_CERTIFICATE_PASSWORD: the .p12 password
#    - APPLE_SIGNING_IDENTITY: "Developer ID Application: Your Name (TEAMID)"
#    - APPLE_ID: your Apple ID email
#    - APPLE_PASSWORD: app-specific password (appleid.apple.com → Sign-In → App-Specific Passwords)
#    - APPLE_TEAM_ID: your 10-character team ID
#
# Code signing is optional — builds will succeed without these secrets (unsigned),
# which allows forks and PRs to build without Apple credentials.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SkillVault Desktop ${{ github.ref_name }}'
          releaseBody: |
            Download **SkillVault Desktop** for macOS below.

            ### Installation
            1. Download the `.dmg` file
            2. Open it and drag SkillVault Desktop to Applications
            3. Launch from Applications

            ### What's new
            See the [changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
